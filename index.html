<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>植物战队 — 日夜防守</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <main class="app">

      <!-- ===== 顶栏 ===== -->
      <header class="topbar">
        <h1>植物战队</h1>
        <div class="controls">
          <button id="btnStart">开始游戏</button>
          <button id="btnReset" class="ghost">重置</button>
          <button id="btnSaveConfig" class="ghost">保存配置</button>
          <button id="btnLoadConfig" class="ghost">加载配置</button>
        </div>
        <div class="hud">
          <div class="chip phase-chip" id="phaseChip">等待开始</div>
          <div class="chip">回合 <strong id="roundNum">0</strong></div>
          <div class="chip timer-chip" id="timerChip" style="display:none">⏱ <strong id="dayTimer">30</strong>s</div>
          <div class="chip">❤️ <strong id="livesDisplay">5</strong></div>
          <div class="chip">⭐ <strong id="scoreDisplay">0</strong></div>
          <div class="chip version-chip">🏷️ <strong id="versionDisplay">—</strong></div>
        </div>
      </header>

      <!-- ===== 收集区 ===== -->
      <section class="collection-zone" id="collectionZone">
        <span class="zone-label">收集区</span>
        <span class="zone-hint" id="collectionHint">（白天植物会在此处刷新，点击即可收集到背包）</span>
      </section>

      <!-- ===== 战场：刷怪区 + 种植区（共享坐标系）===== -->
      <div class="battle-wrapper">
        <!-- 刷怪区背景 -->
        <div class="monster-zone-bg">
          <span class="zone-label">刷怪区</span>
        </div>
        <!-- 种植区背景 + 网格 -->
        <div class="planting-zone-bg">
          <span class="zone-label">种植区</span>
          <div class="planting-grid" id="plantingGrid"></div>
        </div>
        <!-- 怪物动画覆盖层（绝对定位，覆盖整个 battle-wrapper）-->
        <div class="battle-area" id="battleArea"></div>
      </div>

      <!-- ===== 背包 ===== -->
      <section class="backpack-section">
        <div class="backpack-header">
          <h3>背包</h3>
          <span id="backpackCount">0 个植物</span>
          <span class="backpack-hint">点击植物选中 → 再点种植区空格放置</span>
        </div>
        <div id="backpackItems" class="backpack-items"></div>
      </section>

      <!-- ===== 植物库（可折叠配置）===== -->
      <section class="panel library-panel">
        <div class="library-panel-head" id="libraryToggle">
          <h3>植物库配置 <span class="toggle-hint">（点击展开 / 收起）</span></h3>
        </div>
        <div class="library-panel-body" id="libraryBody" style="display:none">
          <p class="panel-tip">可在此处为每个植物填写图片 URL、调整属性后保存配置。</p>
          <div class="library-header">
            <button id="btnAddPlant" class="ghost">＋ 添加植物</button>
          </div>
          <div id="plantLibraryList" class="library-list"></div>
        </div>
      </section>

      <!-- ===== 日志 ===== -->
      <section class="panel log-panel">
        <div class="log-head">
          <h3>战斗日志</h3>
          <button id="btnClearLog" class="ghost">清空</button>
        </div>
        <div id="log"></div>
      </section>

    </main>
    <script src="app.js"></script>
  </body>
</html>
